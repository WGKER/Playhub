name: Docker Build & Download (ARM64)

# 仅手动触发（无自动触发）
on:
  workflow_dispatch:

# 只在这里设置一次 镜像名称 + 标签，全局自动使用
env:
  IMAGE_NAME: playhub
  IMAGE_TAG: 2026052501  # 统一版本，改这里即可

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 构建 ARM64 镜像（不推送、不上传）
      - name: Build ARM64 image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64  # 仅构建arm64，amd64已注释
          push: false            # 关键：不推送镜像
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}  # 自动匹配
          outputs: type=docker,dest=/tmp/playhub-arm64.tar  # 导出为本地文件
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 上传到 GitHub Actions 供下载
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name:  ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}.tar
          path: /tmp/playhub-arm64.tar
